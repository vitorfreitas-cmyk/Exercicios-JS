<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <style>
            .marcador{
                border: 10px solid gray;
                background-color: rgb(74, 74, 152);
                margin-top: 10px;
            }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col marcador text-center">
                <a href="BANNER">BANNER</a>
            </div>
        </div>
        <div class="row">
            <div class="col-4 marcador text-center">
                MENU LATERAL
            </div>
            <div class="col-sx-12 col-lg-8 marcador text-center">
                ARTIGO
            </div>
        </div>
        <div class="row">
            <div class="col-3 col-sx-6 marcador text-center">
                PROPAGANDA 1
            </div>
            <div  col-lg-6 class="col-sx-6 marcador text-center">
                PROPAGANDA 2 
            </div>
            <div class="col-sx-12 col-lg-3  marcador text-center">
                PROPAGANDA 3
            </div>
        </div>
        <div class="row">
            <div class="col-3 marcador text-center">
                AREA 1
            </div>
            <div class="col-3 marcador text-center">
                AREA 2
            </div>
            <div class="col-3 marcador text-center">
                AREA 3
            </div>
            <div class="col-3 text-center marcador"> 
                AREA 4
            </div>
        </div>
    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js" integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V" crossorigin="anonymous"></script>
    
</body>
</html>
