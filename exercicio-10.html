<!DOCTYPE html>
<html lang="PT-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXERCICIO 8</title>
    <script>
        var mes = prompt("Digite o numero de dias que tem seu mes (28, 30, 31)");

        switch (mes) {
            case "28":
                document.write("Seu mês é 02");
                break;

            case "30":
                document.write("Seu mês é 04, 06, 09 e 11.");
                break;

            case "31":
                document.write("Seu mês é 01, 03, 05, 07, 08, 10 e 12");
                break;

             default:
                document.write("Erro: conceito inexistente!");
        }
    </script>
</head>

<body>

</body>

</html>
