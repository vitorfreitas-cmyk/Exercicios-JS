<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        var nome = prompt('Qual seu nome?');
        var salário = Number(prompt('Qual  seu salário?'));
        var vendas = Number(prompt('Qual o valor da sua venda?'))
        var comissão = 0;

        comissão= vendas * 0.025;
        salário= salário + comissão;
    </script>
</head>
<body>
    <script>
        document.write('<h1>Olá ' + nome + ', você irá receber ' + salário + ' esse mês  </h2>');
    </script>
</body>
</html>
