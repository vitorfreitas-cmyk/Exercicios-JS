<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        var nome = prompt('Qual seu nome?');
        var salário = parseFloat(('Qual seu salário'));
        var vendas = prompt('Qual o valor da sua venda')
        var comissão = 0;

        comissão= vendas*0.025;
        salário= salário+comissão;
    </script>
</head>
<body>
    <script>
        document.write('<h2>Olá ' + nome + ', seu salário' + salário + ' e sua venda é de R$ ' + vendas + ', sua comissão é de' + comissão +' </h2>');
    </script>
    
    
</body>
</html>
