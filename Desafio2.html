<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        var nome = prompt('Qual seu nome?');
        var salário = prompt('Qual seu salário');
        var vendas = prompt('Qual o valor da sua venda')
        var comissão = vendas*0.025;
    </script>
</head>
<body>
    <script>
        document.write('<h2>Olá ' + nome + ', seu salário é de ' + salário+comissão + ' e sua venda é de R$ ' + vendas + ', correto? </h2>');
    </script>
    
    
</body>
</html>
