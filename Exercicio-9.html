<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXERCICIO 8</title>
    <script>
        var conceito = prompt("Digite o conceito do aluno (A, B, C, D, E ou F):");

        switch (conceito.toUpperCase()) {
            case "A":
                document.write("Excelente");
                break;

            case "B":
                document.write("Ótimo");
                break;

            case "C":
                document.write("Bom");
                break;

            case "D":
                document.write("Regular");
                break;

            case "E":
                document.write("Ruim");
                break;

            case "F":

                document.write("Nos vemos de novo ano que vem...");
                break;

            default:
                console.log("Erro: conceito inexistente!");
        }
    </script>
</head>

<body>

</body>

</html>
