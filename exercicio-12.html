        let capital = parseFloat(prompt("Digite o capital inicial:"));
        let taxa = parseFloat(prompt("Digite a taxa de juros (ex: 10 para 10%):")) / 100;
        let tempo = parseInt(prompt("Digite o tempo (meses ou anos):"));

        let montante = capital * Math.pow((1 + taxa), tempo);
        let juros = montante - capital;

        document.write("Montante final: R$ " + montante.toFixed(2));
        document.write("Juros ganhos: R$ " + juros.toFixed(2));
